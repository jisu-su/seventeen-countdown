name = "seventeen-countdown"
compatibility_date = "2024-04-03"

# Cloudflare Pages 설정
pages_build_output_dir = "./"

# D1 데이터베이스 바인딩 설정  
[[d1_databases]]
binding = "DB" # comments.js 코드에서 context.env.DB로 사용 중인 이름
database_name = "seventeen-comments" # 본인이 생성한 D1 데이터베이스 이름
database_id = "9abf1fed-fb6c-42e5-bfa7-e2afe67273b1" # wrangler d1 info <이름> 명령어로 확인한 ID(UUID)