<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WONWOO Countdown : 2027.01.02</title>
    <link rel="stylesheet" href="../../packages/shared/style.css">
    <link rel="stylesheet" href="../../packages/shared/comment.css">
</head>
<body>

    <div class="main-bg"></div>
    <a href="../../index.html" class="back-button">
        <span class="back-icon">←</span>
    </a>
    
    <div id="diamond-btn" class="diamond-toggle">💎</div>

    <div class="container">

        <!-- TIMER 째깍 -->
        <section id="timer-page" class="page active full-screen">
            <div class="timer-label">WONWOO DISCHARGE COUNTDOWN</div>
            <div id="clock-wonwoo" class="countdown-display"></div>
        </section>

        <!-- COMMENT 섹션 추가 -->
        <section id="fan-page">
            <div class="comment-input-container">
                <textarea id="comment-input" placeholder="원우에게 보낼 응원을 남겨보세요! 💎"></textarea>
                <button id="submit-comment">등록하기</button>
            </div>
            <div id="comment-list">
                <!-- 댓글이 여기에 렌더링됩니다 -->
            </div>
        </section>

    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
